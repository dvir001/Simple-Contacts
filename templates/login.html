<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Simple Contacts</title>
    <link rel="stylesheet" href="/static/configure.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .login-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }
        .login-card h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            color: var(--text-primary);
        }
        .login-card .form-group {
            margin-bottom: 1.25rem;
        }
        .login-card label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }
        .login-card input[type="password"] {
            width: 100%;
            padding: 0.65rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            background: var(--card-bg);
            color: var(--text-primary);
            box-sizing: border-box;
        }
        .login-card input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        .login-card button,
        .login-card .btn-sso {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.7rem;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn-sso {
            background: var(--primary);
            color: #fff;
        }
        .btn-sso:hover {
            background: var(--primary-hover);
        }
        .btn-sso svg {
            flex-shrink: 0;
        }
        .btn-password {
            background: var(--primary);
            color: #fff;
        }
        .btn-password:hover {
            background: var(--primary-hover);
        }
        .login-error {
            background: #fef2f2;
            color: #dc2626;
            padding: 0.6rem 0.8rem;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .login-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.25rem 0;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        .login-divider::before,
        .login-divider::after {
            content: "";
            flex: 1;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h1 data-i18n="login.title">Simple Contacts</h1>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            {% if sso_enabled %}
            {# ── SSO primary ── #}
            <a href="/login/sso" class="btn-sso">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 23 23" fill="currentColor">
                    <path d="M0 0h11v11H0zM12 0h11v11H12zM0 12h11v11H0zM12 12h11v11H12z"/>
                </svg>
                <span data-i18n="login.ssoButton">Sign in with Microsoft</span>
            </a>
            {% else %}
            {# ── Password fallback (only when SSO is NOT configured) ── #}
            <form method="POST" action="/login/password">
                <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
                <div class="form-group">
                    <label for="password" data-i18n="login.passwordLabel">Password</label>
                    <input type="password" id="password" name="password" autofocus required>
                </div>
                <button type="submit" class="btn-password" data-i18n="login.passwordButton">Sign In</button>
            </form>
            {% endif %}
        </div>
    </div>

    <script src="/static/i18n.js"></script>
</body>
</html>
